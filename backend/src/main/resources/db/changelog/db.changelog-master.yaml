databaseChangeLog:
  - changeSet:
      id: 1
      author: admin
      comment: Create users table
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  defaultValue: STUDENT
              - column:
                  name: avatar_url
                  type: VARCHAR(255)
              - column:
                  name: department
                  type: VARCHAR(100)
              - column:
                  name: student_id
                  type: VARCHAR(50)
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 2
      author: admin
      comment: Create applications table
      changes:
        - createTable:
            tableName: applications
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: applicant_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_applications_applicant
                    references: users(id)
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  defaultValue: PENDING
              - column:
                  name: priority
                  type: VARCHAR(20)
                  defaultValue: NORMAL
              - column:
                  name: attachment_urls
                  type: TEXT
              - column:
                  name: metadata
                  type: JSON
                  constraints:
                    nullable: true
              - column:
                  name: submitted_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: withdrawn
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: withdrawn_at
                  type: TIMESTAMP
              - column:
                  name: completed_at
                  type: TIMESTAMP

  - changeSet:
      id: 3
      author: admin
      comment: Create approvals table
      changes:
        - createTable:
            tableName: approvals
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: application_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_approvals_application
                    references: applications(id)
              - column:
                  name: approver_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_approvals_approver
                    references: users(id)
              - column:
                  name: agent_role
                  type: VARCHAR(50)
              - column:
                  name: action
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: comment
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addUniqueConstraint:
            tableName: approvals
            columnNames: application_id, approver_id
            constraintName: uq_approvals_application_approver

  - changeSet:
      id: 4
      author: admin
      comment: Create workflows table
      changes:
        - createTable:
            tableName: workflows
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: app_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: definition
                  type: JSON
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 5
      author: admin
      comment: Create workflow_instances table
      changes:
        - createTable:
            tableName: workflow_instances
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: application_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_workflow_instances_application
                    references: applications(id)
              - column:
                  name: workflow_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_workflow_instances_workflow
                    references: workflows(id)
              - column:
                  name: current_node_id
                  type: VARCHAR(50)
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  defaultValue: RUNNING
              - column:
                  name: context
                  type: JSON
                  constraints:
                    nullable: true
              - column:
                  name: started_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: completed_at
                  type: TIMESTAMP

  - changeSet:
      id: 6
      author: admin
      comment: Create workflow_nodes table
      changes:
        - createTable:
            tableName: workflow_nodes
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workflow_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_workflow_nodes_workflow
                    references: workflows(id)
              - column:
                  name: node_id
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: node_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: node_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: config
                  type: JSON
              - column:
                  name: position
                  type: INT
                  defaultValue: 0

  - changeSet:
      id: 7
      author: admin
      comment: Create agent_actions table
      changes:
        - createTable:
            tableName: agent_actions
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: application_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_agent_actions_application
                    references: applications(id)
              - column:
                  name: agent_role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: action_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: result
                  type: JSON
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 8
      author: admin
      comment: Create refresh_tokens table
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: VARCHAR(36)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_tokens_user
                    references: users(id)
              - column:
                  name: token
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

  - changeSet:
      id: 10
      author: admin
      comment: Create application_attachments table
      changes:
        - createTable:
            tableName: application_attachments
            columns:
              - column:
                  name: application_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_app_attachments_application
                    references: applications(id)
              - column:
                  name: attachment_url
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: application_attachments
            columnNames: application_id, attachment_url
            constraintName: pk_app_attachments
