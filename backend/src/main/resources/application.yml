server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: student-approval
  main:
    allow-circular-references: true
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/student_approval?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    driver-class-name: ${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}
    username: ${DATABASE_USER:root}
    password: ${DATABASE_PASSWORD:root}
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  cache:
    type: redis

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationWhichMustBeLongEnough}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    root: INFO
    com.agentteam: DEBUG
    org.springframework.security: DEBUG
