services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: student-approval-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_approval
      MYSQL_USER: student
      MYSQL_PASSWORD: student123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: student-approval-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: student-approval-backend
    environment:
      DATABASE_URL: jdbc:mysql://mysql:3306/student_approval?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DATABASE_USER: root
      DATABASE_PASSWORD: root
      DATABASE_DRIVER: com.mysql.cj.jdbc.Driver
      HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-mySecretKeyForJWTTokenGenerationWhichMustBeLongEnough}
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: student-approval-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:
